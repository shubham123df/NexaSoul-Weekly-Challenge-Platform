<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login Test</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 600px;
            margin: 50px auto;
            padding: 20px;
            background: #1a1a2e;
            color: #fff;
        }
        .test-box {
            background: #16213e;
            padding: 20px;
            border-radius: 10px;
            margin: 20px 0;
        }
        button {
            background: #0f3460;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 5px;
            cursor: pointer;
            margin: 5px;
        }
        button:hover {
            background: #e94560;
        }
        .result {
            background: #0f3460;
            padding: 15px;
            border-radius: 5px;
            margin: 10px 0;
            font-family: monospace;
            white-space: pre-wrap;
        }
        .success { border-left: 4px solid #4caf50; }
        .error { border-left: 4px solid #f44336; }
    </style>
</head>
<body>
    <h1>Admin Login Test</h1>
    
    <div class="test-box">
        <h2>Test 1: Direct API Call</h2>
        <button onclick="testDirectAPI()">Test Admin API</button>
        <div id="result1"></div>
    </div>

    <div class="test-box">
        <h2>Test 2: Check Server Status</h2>
        <button onclick="testServerStatus()">Check Server</button>
        <div id="result2"></div>
    </div>

    <div class="test-box">
        <h2>Test 3: Environment Variables</h2>
        <button onclick="checkEnv()">Check Config</button>
        <div id="result3"></div>
    </div>

    <script>
        const API_URL = 'http://localhost:5000/api';
        const ADMIN_SECRET = 'nexasoul-admin-2026';

        async function testDirectAPI() {
            const resultDiv = document.getElementById('result1');
            resultDiv.innerHTML = '<p>Testing...</p>';
            
            try {
                console.log('Testing admin API with secret:', ADMIN_SECRET);
                
                const response = await fetch(`${API_URL}/admin/quizzes`, {
                    method: 'GET',
                    headers: {
                        'x-admin-secret': ADMIN_SECRET,
                        'Content-Type': 'application/json'
                    }
                });

                console.log('Response status:', response.status);
                const data = await response.json();
                console.log('Response data:', data);

                if (response.ok) {
                    resultDiv.innerHTML = `<div class="result success">✅ SUCCESS!\nStatus: ${response.status}\nData: ${JSON.stringify(data, null, 2)}</div>`;
                } else {
                    resultDiv.innerHTML = `<div class="result error">❌ FAILED!\nStatus: ${response.status}\nMessage: ${data.message}\n\nCheck server console for details.</div>`;
                }
            } catch (error) {
                console.error('Error:', error);
                resultDiv.innerHTML = `<div class="result error">❌ ERROR!\n${error.message}\n\nMake sure the server is running on port 5000</div>`;
            }
        }

        async function testServerStatus() {
            const resultDiv = document.getElementById('result2');
            resultDiv.innerHTML = '<p>Checking server...</p>';
            
            try {
                const response = await fetch(`${API_URL}/quiz/active`);
                const data = await response.json();
                
                resultDiv.innerHTML = `<div class="result success">✅ Server is running!\nStatus: ${response.status}\nAPI URL: ${API_URL}</div>`;
            } catch (error) {
                resultDiv.innerHTML = `<div class="result error">❌ Server not reachable!\nError: ${error.message}\n\nExpected: http://localhost:5000</div>`;
            }
        }

        function checkEnv() {
            const resultDiv = document.getElementById('result3');
            resultDiv.innerHTML = `<div class="result success">
API URL: ${API_URL}
Admin Secret: ${ADMIN_SECRET}
Secret Length: ${ADMIN_SECRET.length} characters

✅ Configuration looks correct!
            </div>`;
        }
    </script>
</body>
</html>
